<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TokoKu — Login</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #ffffff;
      --bg2: #f5f5f5;
      --ink: #0a0a0a;
      --ink2: #2a2a2a;
      --ink3: #777777;
      --ink4: #c8c8c8;
      --border-lt: #e4e4e4;
      --red: #dc2626;
      --red-bg: #fef2f2;
      --green: #16a34a;
      --green-bg: #f0fdf4;
    }

    body {
      background: var(--bg2);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── BRAND ── */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      margin-bottom: 36px;
    }

    @keyframes float {
      0% {
        transform: translateY(0px) rotate(0deg);
      }

      25% {
        transform: translateY(-4px) rotate(-1deg);
      }

      50% {
        transform: translateY(-7px) rotate(0deg);
      }

      75% {
        transform: translateY(-4px) rotate(1deg);
      }

      100% {
        transform: translateY(0px) rotate(0deg);
      }
    }

    @keyframes shadowPulse {
      0% {
        box-shadow: 0 4px 10px rgba(10, 10, 10, 0.25);
      }

      50% {
        box-shadow: 0 10px 24px rgba(10, 10, 10, 0.12);
      }

      100% {
        box-shadow: 0 4px 10px rgba(10, 10, 10, 0.25);
      }
    }

    .brand-mark {
      width: 48px;
      height: 48px;
      background: var(--ink);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: float 3s ease-in-out infinite, shadowPulse 3s ease-in-out infinite;
    }

    .brand-mark svg {
      width: 24px;
      height: 24px;
    }

    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      letter-spacing: 3px;
      color: var(--ink);
      line-height: 1;
    }

    /* ── CARD ── */
    .login-card {
      background: var(--bg);
      border: 1.5px solid var(--border-lt);
      border-radius: 24px;
      padding: 52px 48px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
    }

    .card-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ink4);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-eyebrow::before {
      content: '';
      display: block;
      width: 14px;
      height: 1.5px;
      background: var(--ink4);
    }

    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 58px;
      letter-spacing: 2px;
      line-height: 0.9;
      color: var(--ink);
      margin-bottom: 36px;
    }

    .card-title em {
      font-style: normal;
      -webkit-text-stroke: 2px var(--ink);
      color: transparent;
    }

    /* ── FIELDS ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 18px;
    }

    .field label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--ink4);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .field label::before {
      content: '';
      width: 4px;
      height: 4px;
      background: var(--ink);
      border-radius: 50%;
      display: block;
    }

    .field input {
      border: 1.5px solid var(--border-lt);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 15px;
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      background: var(--bg);
      width: 100%;
    }

    .field input:focus {
      border-color: var(--ink);
      box-shadow: 0 0 0 3px rgba(10, 10, 10, 0.06);
    }

    .field input::placeholder {
      color: var(--ink4);
    }

    /* ── BUTTON ── */
    .btn-login {
      width: 100%;
      padding: 16px;
      background: var(--ink);
      color: var(--bg);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      border: 1.5px solid var(--ink);
      border-radius: 99px;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 28px;
    }

    .btn-login:hover {
      background: transparent;
      color: var(--ink);
    }

    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ── ALERT ── */
    .alert {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      font-size: 12.5px;
      border: 1.5px solid;
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.3px;
    }

    .alert.show {
      display: block;
    }

    .alert.error {
      color: var(--red);
      border-color: var(--red);
      background: var(--red-bg);
    }

    .alert.success {
      color: var(--green);
      border-color: var(--green);
      background: var(--green-bg);
    }

    /* ── DIVIDER ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border-lt);
      margin: 28px 0 0;
    }

    .footer-note {
      margin-top: 14px;
      font-size: 11.5px;
      color: var(--ink4);
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.5px;
      text-align: center;
    }

    /* ── LOGIN INFO ── */
    /* ── LOGIN INFO ── */
    /* ── LOGIN INFO ── */
    .login-info {
      margin-bottom: 20px;
      padding: 10px 14px;
      background: var(--bg2);
      border: 1px solid var(--border-lt);
      border-radius: 999px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      color: var(--ink3);
    }

    .login-info strong {
      color: var(--ink);
    }

    .login-divider {
      color: var(--ink4);
    }

    @media (max-width: 540px) {
      .login-card {
        padding: 36px 28px;
      }

      .card-title {
        font-size: 46px;
      }
    }
  </style>
</head>

<body>

  <a class="brand" href="#">
    <div class="brand-mark">
      <svg viewBox="0 0 20 20" fill="white">
        <path
          d="M2 4a2 2 0 012-2h12a2 2 0 012 2v1H2V4zm0 3h16v9a2 2 0 01-2 2H4a2 2 0 01-2-2V7zm5 3a1 1 0 000 2h6a1 1 0 000-2H7z" />
      </svg>
    </div>
    <span class="brand-name">TokoKu</span>
  </a>

  <div class="login-card">
    <div class="card-eyebrow">Admin Panel</div>
    <div class="card-title">LOGIN<br><em>PAGES</em></div>

    <div class="login-info">
      <span>Username: <strong>admin</strong></span>
      <span class="login-divider">•</span>
      <span>Password: <strong>ronal</strong></span>
    </div>

    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="Masukkan username..." autocomplete="username">
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Masukkan password..." autocomplete="current-password">
    </div>

    <button class="btn-login" id="btnLogin" onclick="doLogin()">
      <svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M9 1h3a1 1 0 011 1v10a1 1 0 01-1 1H9M6 10l3-3-3-3M9 7H1" />
      </svg>
      <span id="btnText">Masuk</span>
    </button>

    <div class="alert" id="alertBox"></div>

    <hr class="divider">
    <div class="footer-note">TokoKu &mdash; Sistem Manajemen Toko</div>
  </div>

  <script>
    const API = 'http://localhost:8080/platform/api-toko';

    // Jika sudah punya token, langsung ke index
    if (localStorage.getItem('token_toko')) {
      window.location.href = 'index.html';
    }

    function showAlert(msg, type) {
      const el = document.getElementById('alertBox');
      el.textContent = msg;
      el.className = 'alert show ' + type;
    }

    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!username || !password) {
        showAlert('Username dan password wajib diisi!', 'error');
        return;
      }

      const btn = document.getElementById('btnLogin');
      document.getElementById('btnText').textContent = 'Memproses...';
      btn.disabled = true;

      try {
        const res = await fetch(`${API}/login.php`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (data.status === 'success') {
          localStorage.setItem('token_toko', data.token);
          localStorage.setItem('username_toko', username); // simpan username untuk badge
          showAlert('Login berhasil! Mengalihkan...', 'success');
          setTimeout(() => window.location.href = 'index.html', 800);
        } else {
          showAlert(data.pesan || 'Login gagal.', 'error');
          btn.disabled = false;
          document.getElementById('btnText').textContent = 'Masuk';
        }
      } catch (e) {
        showAlert('Tidak dapat terhubung ke server.', 'error');
        btn.disabled = false;
        document.getElementById('btnText').textContent = 'Masuk';
      }
    }

    // Enter key support
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>

</html>
