<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <title>FinStore — Inventaris</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%230a0a0a%22/><text x=%2250%22 y=%2266%22 font-size=%2240%22 font-family=%22Arial,sans-serif%22 font-weight=%22900%22 fill=%22white%22 text-anchor=%22middle%22>FS</text></svg>">
  <link rel="manifest" href="./manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #ffffff;
      --bg2: #f5f5f5;
      --bg3: #efefef;
      --ink: #0a0a0a;
      --ink2: #2a2a2a;
      --ink3: #777777;
      --ink4: #c8c8c8;
      --border: #0a0a0a;
      --border-lt: #e4e4e4;
      --danger: #e53935;
      --success: #2e7d32;
    }

    body {
      background: var(--bg2);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    .topnav-outer {
      padding: 10px 16px 0;
      background: transparent;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topnav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1.5px solid var(--border-lt);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 64px;
    }

    .brand {
      display: inline-flex;
      flex-direction: column;
      gap: 4px;
      text-decoration: none;
      line-height: 1;
    }

    .brand-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 3px;
      line-height: 1;
    }

    .brand-text .fin { color: var(--ink); }
    .brand-text .store { color: rgba(10, 10, 10, 0.25); }

    .brand-line { display: flex; gap: 3px; align-items: center; }
    .brand-line-solid { height: 2px; width: 24px; background: var(--ink); border-radius: 99px; }
    .brand-line-dot { width: 4px; height: 4px; background: rgba(10, 10, 10, 0.2); border-radius: 50%; }
    .brand-line-thin { height: 2px; width: 36px; background: rgba(10, 10, 10, 0.08); border-radius: 99px; }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-divider { width: 1px; height: 22px; background: var(--border-lt); }

    .btn-kelola {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 20px;
      background: var(--ink);
      color: var(--bg);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
      border: 1.5px solid var(--ink);
      border-radius: 99px;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
    }

    .btn-kelola:hover { background: transparent; color: var(--ink); }

    .btn-kelola-icon {
      width: 20px;
      height: 20px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .user-menu-wrap { position: relative; }

    .user-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px 6px 6px;
      border: 1.5px solid var(--border-lt);
      border-radius: 99px;
      background: var(--bg2);
      cursor: pointer;
      transition: all 0.15s;
      -webkit-user-select: none;
      user-select: none;
    }

    .user-badge:hover, .user-badge.open { border-color: var(--ink); background: var(--bg); }

    .user-badge-icon {
      width: 26px;
      height: 26px;
      background: var(--ink);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .user-badge-name { font-size: 12.5px; font-weight: 600; color: var(--ink2); font-family: 'DM Sans', sans-serif; }

    .user-chevron { transition: transform 0.2s ease; color: var(--ink4); }
    .user-badge.open .user-chevron { transform: rotate(180deg); }

    .user-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      background: var(--bg);
      border: 1.5px solid var(--border-lt);
      border-radius: 14px;
      padding: 6px;
      min-width: 180px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.10);
      z-index: 150;
      flex-direction: column;
      gap: 2px;
    }

    .user-menu-wrap.open .user-dropdown { display: flex; }

    .user-info {
      padding: 10px 12px 12px;
      border-bottom: 1px solid var(--border-lt);
      margin-bottom: 4px;
    }

    .user-info-name { font-size: 13px; font-weight: 700; color: var(--ink); font-family: 'DM Sans', sans-serif; }
    .user-info-role { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1.5px; color: var(--ink4); text-transform: uppercase; margin-top: 2px; }

    .user-drop-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      font-size: 12.5px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink3);
      background: transparent;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      transition: all 0.12s;
      width: 100%;
    }

    .user-drop-item:hover { background: var(--bg2); color: var(--ink); }
    .user-drop-item.danger { color: var(--danger); }
    .user-drop-item.danger:hover { background: #fff0f0; }

    .hamburger {
      display: none;
      background: none;
      border: 1.5px solid var(--border-lt);
      border-radius: 8px;
      padding: 7px 9px;
      cursor: pointer;
      color: var(--ink);
      transition: all 0.15s;
    }

    .hamburger:hover { background: var(--bg2); }

    .mobile-menu {
      display: none;
      position: fixed;
      top: 64px;
      left: 0;
      right: 0;
      z-index: 99;
      background: var(--bg);
      border-bottom: 1.5px solid var(--border-lt);
      padding: 16px 24px;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .mobile-menu.open { display: flex; }
    .mobile-menu .btn-kelola { justify-content: center; }

    .hero {
      position: relative;
      overflow: hidden;
      border-bottom: 1.5px solid var(--border-lt);
      padding: 52px 48px 56px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
      min-height: 500px;
    }

    .hero-slides { position: absolute; inset: 0; z-index: 0; }

    .hero-slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 0.8s ease;
      filter: brightness(1.3);
    }

    .hero-slide.active { opacity: 1; }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.20) 50%, rgba(0,0,0,0.0) 100%);
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      color: white;
      margin-left: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transform: translateY(-50px);
    }

    .hero-dots { position: absolute; bottom: 18px; right: 48px; z-index: 3; display: flex; gap: 6px; align-items: center; }

    .hero-dot {
      width: 6px;
      height: 6px;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.4);
      border: none;
      cursor: pointer;
      padding: 0;
      transition: all 0.35s ease;
    }

    .hero-dot.active { width: 22px; background: white; }

    .hero-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 3;
      width: 36px;
      height: 36px;
      background: rgba(255, 255, 255, 0.85);
      border: 1.5px solid var(--border-lt);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
    }

    .hero-arrow:hover { background: var(--ink); border-color: var(--ink); color: white; }
    .hero-arrow svg { pointer-events: none; }
    .hero-arrow-prev { left: 20px; }
    .hero-arrow-next { right: 20px; }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 14px;
    }

    .hero-eyebrow::before {
      content: '';
      display: block;
      width: 18px;
      height: 1.5px;
      background: rgba(255, 255, 255, 0.4);
    }

    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(56px, 8vw, 100px);
      line-height: 0.88;
      letter-spacing: 2px;
      color: white;
    }

    .hero-title em { font-style: normal; -webkit-text-stroke: 2px white; color: transparent; }

    .hero-sub {
      margin-top: 16px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.6;
      max-width: 300px;
    }

    .toolbar {
      padding: 16px 48px;
      border-bottom: 1.5px solid var(--border-lt);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      background: var(--bg);
    }

    .toolbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .count-txt { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--ink4); white-space: nowrap; }

    .search-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1.5px solid var(--border-lt);
      border-radius: 99px;
      padding: 7px 14px;
      background: var(--bg2);
      transition: all 0.15s;
    }

    .search-wrap:focus-within { border-color: var(--ink); background: var(--bg); }
    .search-wrap svg { color: var(--ink4); flex-shrink: 0; }

    .search-wrap input {
      border: none;
      outline: none;
      font-size: 12.5px;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      background: transparent;
      width: 150px;
    }

    .search-wrap input::placeholder { color: var(--ink4); }

    .search-clear { background: none; border: none; cursor: pointer; color: var(--ink3); font-size: 13px; padding: 0; display: none; }
    .search-clear.show { display: block; }

    .grid-section { padding: 28px 48px 64px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .cursor-blink {
      position: absolute;
      width: 3px;
      height: 0.85em;
      background: white;
      margin-left: 2px;
      animation: cursorBlink 1s step-end infinite;
    }

    @keyframes cursorBlink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    #tw-line1, #tw-line2 { height: 0.88em; line-height: 0.88; overflow: hidden; }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .item-card {
      background: var(--bg);
      border: 1.5px solid var(--border-lt);
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.2s;
      animation: fadeUp 0.4s ease both;
      position: relative;
    }

    .item-card:hover { box-shadow: 0 12px 40px rgba(0, 0, 0, 0.11); transform: translateY(-4px); }

    .ic-img-wrap {
      position: relative;
      width: 100%;
      height: 180px;
      min-height: 180px;
      max-height: 180px;
      background: var(--bg2);
      flex-shrink: 0;
      overflow: hidden;
    }

    .ic-img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      object-position: center center;
      display: block;
      padding: 12px;
    }

    .ic-no-img {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg3);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--ink4);
      text-transform: uppercase;
    }

    .ic-num {
      position: absolute;
      top: 12px; right: 12px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: #fff;
      background: rgba(10, 10, 10, 0.5);
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(6px);
      padding: 3px 9px;
      border-radius: 99px;
      letter-spacing: 1px;
    }

    .ic-body { padding: 16px 16px 0; display: flex; flex-direction: column; flex: 1; }

    .ic-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.4;
      margin-bottom: 4px;
      word-break: break-word;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 40px;
    }

    .ic-desc {
      font-size: 11.5px;
      color: var(--ink3);
      line-height: 1.5;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 34px;
    }

    .ic-price-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--ink4);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 2px;
      margin-top: 8px;
    }

    .ic-price { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 0.5px; color: var(--ink); line-height: 1; margin-bottom: 14px; }

    .ic-btn-beli {
      width: calc(100% + 32px);
      margin: auto -16px 0 -16px;
      padding: 14px;
      background: var(--ink);
      color: var(--bg);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
      border: none;
      border-radius: 0 0 18px 18px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .ic-btn-beli:hover { background: var(--ink2); box-shadow: 0 4px 16px rgba(10, 10, 10, 0.18); }

    .highlight { background: var(--ink); color: var(--bg); padding: 0 2px; border-radius: 2px; }

    .empty-state {
      grid-column: 1 / -1;
      padding: 100px 24px;
      text-align: center;
      border: 1.5px dashed var(--border-lt);
      border-radius: 16px;
    }

    .empty-num { font-family: 'Bebas Neue', sans-serif; font-size: 80px; color: var(--ink4); line-height: 1; margin-bottom: 10px; }
    .empty-text { font-size: 13px; color: var(--ink3); }

    .pagination-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 32px 0 8px;
      grid-column: 1 / -1;
    }

    .btn-page {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 22px;
      background: transparent;
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
      border: 1.5px solid var(--ink);
      border-radius: 99px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-page:hover:not(:disabled) { background: var(--ink); color: var(--bg); }
    .btn-page:disabled { opacity: 0.3; cursor: not-allowed; border-color: var(--ink4); color: var(--ink4); }

    .page-info {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--ink3);
      letter-spacing: 0.5px;
      min-width: 80px;
      text-align: center;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--ink);
      color: var(--bg);
      padding: 12px 24px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      transition: transform 0.3s cubic-bezier(.34, 1.56, .64, 1);
      z-index: 999;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { background: var(--danger); }
    .toast.success { background: var(--success); }

    .skeleton-card { background: var(--bg); border: 1.5px solid var(--border-lt); border-radius: 20px; overflow: hidden; animation: shimmer 1.4s infinite; }
    .sk-img { width: 100%; height: 160px; background: var(--bg3); }
    .sk-body { padding: 18px 18px 16px; }
    .sk-line { background: var(--bg3); border-radius: 4px; margin-bottom: 10px; }

    @keyframes shimmer {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.45; }
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(10, 10, 10, 0.5);
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal-box {
      background: var(--bg);
      border-radius: 20px;
      border: 1.5px solid var(--border-lt);
      padding: 36px;
      min-width: 320px;
      max-width: 460px;
      width: 90%;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.18);
      animation: fadeUp 0.25s ease;
    }

    .modal-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink4); margin-bottom: 6px; }
    .modal-name { font-family: 'Bebas Neue', sans-serif; font-size: 38px; letter-spacing: 1px; line-height: 1.1; margin-bottom: 24px; word-break: break-word; }

    .modal-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--border-lt); }
    .modal-row:last-of-type { border-bottom: none; }
    .modal-row-key { font-size: 12px; color: var(--ink3); }
    .modal-row-val { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; }

    .modal-close {
      margin-top: 24px;
      width: 100%;
      padding: 12px;
      background: var(--ink);
      color: var(--bg);
      border: none;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      transition: opacity 0.15s;
    }

    .modal-close:hover { opacity: 0.8; }

    .filter-kategori {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      flex: 1;
    }

    .fk-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.3px;
      border-radius: 99px;
      border: 1.5px solid var(--border-lt);
      background: transparent;
      color: var(--ink3);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .fk-pill:hover { border-color: var(--ink); color: var(--ink); background: var(--bg2); }
    .fk-pill.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

    .sort-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1.5px solid var(--border-lt);
      border-radius: 99px;
      padding: 7px 14px;
      background: var(--bg2);
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .sort-wrap:hover, .sort-wrap.open { border-color: var(--ink); background: var(--bg); }
    .sort-selected { font-size: 12.5px; font-weight: 500; font-family: 'DM Sans', sans-serif; color: var(--ink); }
    .sort-chevron { transition: transform 0.2s ease; color: var(--ink3); }
    .sort-wrap.open .sort-chevron { transform: rotate(180deg); }

    .sort-menu {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--bg);
      border: 1.5px solid var(--border-lt);
      border-radius: 14px;
      padding: 6px;
      min-width: 170px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.09);
      z-index: 50;
      flex-direction: column;
      gap: 2px;
    }

    .sort-wrap.open .sort-menu { display: flex; }

    .sort-opt {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      font-size: 12.5px;
      font-weight: 500;

  <script>
    const _authToken = localStorage.getItem('token_toko');
    if (!_authToken) window.location.href = 'login.html';

    const savedUser = localStorage.getItem('username_toko');
    if (savedUser) {
      document.querySelectorAll('#userBadgeName, #userBadgeNameMobile, #dropdownUserName')
        .forEach(el => el.textContent = savedUser);
      const initials = savedUser.substring(0, 2).toUpperCase();
      const initialEl = document.getElementById('userInitial');
      if (initialEl) initialEl.textContent = initials;
    }

    function logout() {
      localStorage.removeItem('token_toko');
      localStorage.removeItem('username_toko');
      window.location.href = 'login.html';
    }

    function toggleMobileMenu() {
      document.getElementById('mobileMenu').classList.toggle('open');
    }

    function toggleUserDropdown(e) {
      e.stopPropagation();
      const wrap  = document.getElementById('userMenuWrap');
      const badge = document.getElementById('userBadge');
      wrap.classList.toggle('open');
      badge.classList.toggle('open');
    }

    document.addEventListener('click', function (e) {
      const menu      = document.getElementById('mobileMenu');
      const hamburger = document.querySelector('.hamburger');
      if (menu.classList.contains('open') && !menu.contains(e.target) && !hamburger.contains(e.target)) {
        menu.classList.remove('open');
      }
      const wrap  = document.getElementById('userMenuWrap');
      const badge = document.getElementById('userBadge');
      if (wrap && !wrap.contains(e.target)) {
        wrap.classList.remove('open');
        badge.classList.remove('open');
      }
    });

    let _toastTimer = null;
    function showToast(msg, type) {
      const toast = document.getElementById('toast');
      document.getElementById('toastMsg').textContent  = msg;
      document.getElementById('toastIcon').textContent = type === 'success' ? '✓' : '⚠️';
      toast.className = 'toast ' + (type || 'error');
      toast.classList.add('show');
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(function () { toast.classList.remove('show'); }, 3500);
    }

    let _currentPageData = [];

    function openModal(barang, no) {
      document.getElementById('modalName').textContent  = barang.nama_barang;
      document.getElementById('modalHarga').textContent = 'Rp ' + Number(barang.harga).toLocaleString('id-ID');
      document.getElementById('modalNo').textContent    = '#' + String(no).padStart(3, '0');
      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
    function handleModalClick(e) {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    }
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeModal(); });

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function renderTable(data, totalData) {
      _currentPageData = data || [];
      const q    = document.getElementById('searchInput').value.trim().toLowerCase();
      const grid = document.getElementById('cardGrid');

      document.getElementById('searchClear').className = q ? 'search-clear show' : 'search-clear';
      document.getElementById('countBadge').textContent = (totalData || 0) + ' item';

      if (!_currentPageData.length) {
        grid.innerHTML = '<div class="empty-state">' +
          '<div class="empty-num">' + (q ? '?' : '0') + '</div>' +
          '<div class="empty-text">' + (q ? '"' + escapeHtml(q) + '" tidak ditemukan.' : 'Belum ada barang.') + '</div>' +
          '</div>' +
          paginationHTML();
        attachPaginationEvents();
        return;
      }

      function hl(text) {
        const safe = escapeHtml(text);
        if (!q) return safe;
        const safeQ = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        return safe.replace(new RegExp('(' + safeQ + ')', 'gi'), '<span class="highlight">$1</span>');
      }

      const cardsHtml = _currentPageData.map(function (b, i) {
        const delay     = Math.min(i * 40, 400);
        const urlGambar = b.gambar
          ? 'http://localhost:8080/platform/API-TOKO/uploads/' + b.gambar
          : null;
        const imgHtml = urlGambar
          ? '<img src="' + urlGambar + '" class="ic-img" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
            '<div class="ic-no-img" style="display:none">Tidak ada gambar</div>'
          : '<div class="ic-no-img">Tidak ada gambar</div>';

        return '<div class="item-card" style="animation-delay:' + delay + 'ms">' +
          '<div class="ic-img-wrap">' + imgHtml +
          '<span class="ic-num">#' + String(b.id).padStart(3, '0') + '</span>' +
          '</div>' +
          '<div class="ic-body">' +
          '<div class="ic-name">' + hl(b.nama_barang) + '</div>' +
          '<div class="ic-desc">Tersedia di FinStore</div>' +
          '<div class="ic-price-label">Harga</div>' +
          '<div class="ic-price">Rp ' + Number(b.harga).toLocaleString('id-ID') + '</div>' +
          '<button class="ic-btn-beli" onclick=\'openModal(' + JSON.stringify(b) + ',' + b.id + ')\'>Beli</button>' +
          '</div></div>';
      }).join('');

      grid.innerHTML = cardsHtml + paginationHTML();
      attachPaginationEvents();
    }

    function paginationHTML() {
      return '<div class="pagination-wrap">' +
        '<button class="btn-page" id="btnPrev" onclick="goPrev()" ' + (halamanSaatIni <= 1 ? 'disabled' : '') + '>' +
        '<svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 2L5 7l4 5"/></svg>' +
        'Prev</button>' +
        '<span class="page-info" id="pageInfo">Hal ' + halamanSaatIni + ' / ' + (totalHalaman || 1) + '</span>' +
        '<button class="btn-page" id="btnNext" onclick="goNext()" ' + (halamanSaatIni >= totalHalaman ? 'disabled' : '') + '>' +
        'Next<svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 2l4 5-4 5"/></svg>' +
        '</button>' +
        '</div>';
    }

    function attachPaginationEvents() {
      const prev = document.getElementById('btnPrev');
      const next = document.getElementById('btnNext');
      if (prev) prev.onclick = goPrev;
      if (next) next.onclick = goNext;
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      resetHalaman();
      ambilDataBarang();
    }

    document.getElementById('searchInput').addEventListener('keyup', function () {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(function () {
        resetHalaman();
        ambilDataBarang();
      }, 350);
    });

    window.activeKategori = 'semua';
    window.activeSorting  = 'default';

    function setKategori(el) {
      window.activeKategori = el.dataset.kat;
      document.querySelectorAll('.fk-pill').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      resetHalaman();
      ambilDataBarang();
    }

    function pickSort(el, val) {
      document.getElementById('sortLabel').textContent = el.textContent.trim();
      document.querySelectorAll('.sort-opt').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('sortDropdown').classList.remove('open');
      window.activeSorting = val;
      resetHalaman();
      ambilDataBarang();
    }

    document.getElementById('sortDropdown').addEventListener('click', function (e) {
      if (e.target.closest('.sort-opt')) return;
      this.classList.toggle('open');
    });

    document.addEventListener('click', function (e) {
      const dd = document.getElementById('sortDropdown');
      if (!dd.contains(e.target)) dd.classList.remove('open');
    });

    ambilDataBarang();
  </script>

  <script>
    (function () {
      const SLIDES   = ['./assets/laptop.jpg', './assets/laptop2.jpg', './assets/laptop3.jpg'];
      const INTERVAL = 2000;
      const container = document.getElementById('heroSlides');
      const dotsWrap  = document.getElementById('heroDots');
      let current = 0, timer = null;
      const slideEls = [], dotEls = [];

      SLIDES.forEach(function (url, i) {
        const div = document.createElement('div');
        div.className = 'hero-slide' + (i === 0 ? ' active' : '');
        div.style.backgroundImage = "url('" + url + "')";
        container.appendChild(div);
        slideEls.push(div);

        const btn = document.createElement('button');
        btn.className = 'hero-dot' + (i === 0 ? ' active' : '');
        btn.setAttribute('aria-label', 'Slide ' + (i + 1));
        btn.addEventListener('click', function () { goTo(i); });
        dotsWrap.appendChild(btn);
        dotEls.push(btn);
      });

      function goTo(idx) {
        slideEls[current].classList.remove('active');
        dotEls[current].classList.remove('active');
        current = (idx + SLIDES.length) % SLIDES.length;
        slideEls[current].classList.add('active');
        dotEls[current].classList.add('active');
        resetTimer();
      }

      function resetTimer() {
        clearInterval(timer);
        timer = setInterval(function () { goTo(current + 1); }, INTERVAL);
      }

      resetTimer();
      window.heroSlide = function (dir) { goTo(current + dir); };
      const heroEl = document.querySelector('.hero');
      heroEl.addEventListener('mouseenter', function () { clearInterval(timer); });
      heroEl.addEventListener('mouseleave', resetTimer);
    })();
  </script>

  <script>
    (function () {
      const line1El = document.getElementById('tw-line1');
      const line2El = document.getElementById('tw-line2');
      const word1 = 'FIN', word2 = 'STORE';

      function typeText(el, text, delay, isOutline, onDone) {
        let i = 0;
        const cursor = document.createElement('span');
        cursor.className = 'cursor-blink';
        el.appendChild(cursor);
        setTimeout(function tick() {
          if (i < text.length) {
            const c = document.createElement('span');
            c.textContent = text[i];
            if (isOutline) { c.style.webkitTextStroke = '2px white'; c.style.color = 'transparent'; }
            el.insertBefore(c, cursor);
            i++;
            setTimeout(tick, 90 + Math.random() * 50);
          } else { cursor.remove(); if (onDone) onDone(); }
        }, delay);
      }

      function eraseText(el, onDone) {
        const chars = el.querySelectorAll('span:not(.cursor-blink)');
        let i = chars.length - 1;
        function erase() {
          if (i >= 0) { chars[i].remove(); i--; setTimeout(erase, 50); }
          else { if (onDone) onDone(); }
        }
        erase();
      }

      function runLoop() {
        typeText(line1El, word1, 300, false, function () {
          typeText(line2El, word2, 150, true, function () {
            setTimeout(function () {
              eraseText(line2El, function () {
                eraseText(line1El, function () { setTimeout(runLoop, 400); });
              });
            }, 1500);
          });
        });
      }
      runLoop();
    })();
  </script>

</body>
