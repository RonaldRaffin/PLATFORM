<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>TokoKu — Inventaris</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #ffffff;
      --bg2:       #f5f5f5;
      --bg3:       #efefef;
      --ink:       #0a0a0a;
      --ink2:      #2a2a2a;
      --ink3:      #777777;
      --ink4:      #c8c8c8;
      --border:    #0a0a0a;
      --border-lt: #e4e4e4;
      --danger:    #e53935;
      --success:   #2e7d32;
    }

    body { background: var(--bg2); color: var(--ink); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

    /* ── TOPNAV ── */
    .topnav {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg); border-bottom: 1.5px solid var(--border-lt);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px; height: 64px;
    }
    .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }

    @keyframes float {
      0%   { transform: translateY(0px) rotate(0deg); }
      25%  { transform: translateY(-4px) rotate(-1deg); }
      50%  { transform: translateY(-7px) rotate(0deg); }
      75%  { transform: translateY(-4px) rotate(1deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
    @keyframes shadowPulse {
      0%   { box-shadow: 0 4px 10px rgba(10,10,10,0.25); }
      50%  { box-shadow: 0 10px 24px rgba(10,10,10,0.12); }
      100% { box-shadow: 0 4px 10px rgba(10,10,10,0.25); }
    }

    .brand-mark {
      width: 34px; height: 34px; background: var(--ink);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      animation: float 3s ease-in-out infinite, shadowPulse 3s ease-in-out infinite;
      will-change: transform;
    }
    .brand-mark svg { width: 17px; height: 17px; }
    .brand-name { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; color: var(--ink); line-height: 1; }
    .nav-links { display: flex; align-items: center; gap: 6px; }
    .nav-pill {
      padding: 7px 16px; font-size: 12px; font-weight: 600; letter-spacing: 0.5px;
      text-transform: uppercase; text-decoration: none; color: var(--ink3);
      border-radius: 99px; border: 1.5px solid transparent;
      transition: all 0.15s; cursor: pointer; background: none; font-family: 'DM Sans', sans-serif;
    }
    .nav-pill:hover { color: var(--ink); background: var(--bg2); }
    .nav-pill.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
    .btn-cta {
      padding: 9px 20px; background: var(--ink); color: var(--bg);
      font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
      text-decoration: none; border: 1.5px solid var(--ink); border-radius: 99px;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: all 0.15s; display: inline-flex; align-items: center; gap: 7px;
    }
    .btn-cta:hover { background: transparent; color: var(--ink); }

    /* ── USER BADGE ── */
    .user-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 14px 6px 8px;
      border: 1.5px solid var(--border-lt);
      border-radius: 99px;
      background: var(--bg2);
      font-size: 12.5px; font-weight: 600;
      color: var(--ink2);
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.3px;
      cursor: default;
      user-select: none;
    }
    .user-badge-icon {
      width: 26px; height: 26px;
      background: var(--ink);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .user-badge-icon svg { width: 13px; height: 13px; }

    /* FIX #2: Hamburger + Mobile Menu */
    .hamburger {
      display: none; background: none; border: 1.5px solid var(--border-lt);
      border-radius: 8px; padding: 7px 9px; cursor: pointer; color: var(--ink);
      transition: all 0.15s;
    }
    .hamburger:hover { background: var(--bg2); }

    .mobile-menu {
      display: none;
      position: fixed; top: 64px; left: 0; right: 0; z-index: 99;
      background: var(--bg); border-bottom: 1.5px solid var(--border-lt);
      padding: 16px 24px; flex-direction: column; gap: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu .btn-cta { justify-content: center; }

    /* ── HERO ── */
    .hero {
      background: var(--bg);
      border-bottom: 1.5px solid var(--border-lt);
      padding: 52px 48px 44px;
      display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap;
    }
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--ink3); margin-bottom: 14px;
    }
    .hero-eyebrow::before { content: ''; display: block; width: 18px; height: 1.5px; background: var(--ink4); }
    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(56px, 8vw, 100px);
      line-height: 0.88; letter-spacing: 2px;
    }
    .hero-title em { font-style: normal; -webkit-text-stroke: 2px var(--ink); color: transparent; }
    .hero-sub { margin-top: 16px; font-size: 13px; color: var(--ink3); line-height: 1.6; max-width: 300px; }

    /* ── STATS ── */
    .stats-strip {
      background: var(--bg);
      border-bottom: 1.5px solid var(--border-lt);
      display: grid; grid-template-columns: repeat(3, 1fr);
    }
    .stat-block { padding: 22px 36px; border-right: 1.5px solid var(--border-lt); }
    .stat-block:last-child { border-right: none; }
    .stat-label {
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink4); margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .stat-label::before { content: ''; width: 5px; height: 5px; background: var(--ink); border-radius: 50%; display: block; flex-shrink: 0; }
    /* FIX #6: stat-value pakai clamp agar tidak overflow di mobile */
    .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: clamp(20px, 3vw, 36px); letter-spacing: 1px; line-height: 1; }
    .stat-value.sm { font-size: clamp(16px, 2.2vw, 22px); margin-top: 2px; }

    /* ── TOOLBAR ── */
    .toolbar {
      padding: 16px 48px;
      border-bottom: 1.5px solid var(--border-lt);
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      background: var(--bg);
    }
    .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .count-txt { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--ink4); white-space: nowrap; }
    .search-wrap {
      display: flex; align-items: center; gap: 8px;
      border: 1.5px solid var(--border-lt); border-radius: 99px;
      padding: 7px 14px; background: var(--bg2); transition: all 0.15s;
    }
    .search-wrap:focus-within { border-color: var(--ink); background: var(--bg); }
    .search-wrap svg { color: var(--ink4); flex-shrink: 0; }
    .search-wrap input {
      border: none; outline: none; font-size: 12.5px;
      font-family: 'DM Sans', sans-serif; color: var(--ink);
      background: transparent; width: 150px;
    }
    .search-wrap input::placeholder { color: var(--ink4); }
    .search-clear { background: none; border: none; cursor: pointer; color: var(--ink3); font-size: 13px; padding: 0; display: none; }
    .search-clear.show { display: block; }

    /* ── CARD GRID ── */
    .grid-section { padding: 28px 48px 64px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .cursor-blink {
      display: inline-block;
      width: 3px; height: 0.85em;
      background: var(--ink);
      vertical-align: -0.05em;
      margin-left: 2px;
      border-radius: 1px;
      animation: cursorBlink 1s step-end infinite;
    }
    @keyframes cursorBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    #tw-line1, #tw-line2 {
      height: 0.88em;
      line-height: 0.88;
      overflow: hidden;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    /* ── ITEM CARD ── */
    .item-card {
      background: var(--bg);
      border: 1.5px solid var(--border-lt);
      border-radius: 16px;
      padding: 22px 22px 18px;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.2s, transform 0.15s;
      animation: fadeUp 0.4s ease both;
      position: relative;
      overflow: hidden;
    }
    .item-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--ink);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
    }
    .item-card:hover {
      border-color: #b8b8b8;
      box-shadow: 0 6px 24px rgba(0,0,0,0.08);
      transform: translateY(-2px);
    }
    .item-card:hover::before { transform: scaleX(1); }

    .ic-header {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-bottom: 16px;
    }
    .ic-num {
      font-family: 'DM Mono', monospace;
      font-size: 10px; color: var(--ink4); letter-spacing: 1px;
    }
    .ic-name {
      font-size: 15px; font-weight: 600;
      color: var(--ink); line-height: 1.4;
      margin-bottom: 20px; flex: 1;
      word-break: break-word;
    }
    .ic-divider { border: none; border-top: 1px solid var(--border-lt); margin-bottom: 16px; }
    .ic-price-block { display: flex; align-items: flex-end; justify-content: space-between; }
    .ic-price-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--ink4); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
    .ic-price {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px; letter-spacing: 0.5px; color: var(--ink); line-height: 1;
    }
    .ic-arrow {
      width: 34px; height: 34px; border-radius: 50%;
      border: 1.5px solid var(--border-lt);
      display: flex; align-items: center; justify-content: center;
      background: var(--bg2); cursor: pointer; color: var(--ink3);
      font-size: 15px; line-height: 1;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      flex-shrink: 0;
    }
    .ic-arrow:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }

    .highlight { background: var(--ink); color: var(--bg); padding: 0 2px; border-radius: 2px; }

    /* EMPTY */
    .empty-state {
      grid-column: 1 / -1; padding: 100px 24px; text-align: center;
      border: 1.5px dashed var(--border-lt); border-radius: 16px;
    }
    .empty-num { font-family: 'Bebas Neue', sans-serif; font-size: 80px; color: var(--ink4); line-height: 1; margin-bottom: 10px; }
    .empty-text { font-size: 13px; color: var(--ink3); }

    /* FIX #4: Toast notifikasi */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--ink); color: var(--bg);
      padding: 12px 24px; border-radius: 99px;
      font-size: 13px; font-weight: 500;
      display: flex; align-items: center; gap: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
      z-index: 999; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { background: var(--danger); }
    .toast.success { background: var(--success); }

    /* FIX #3: Skeleton loading */
    .skeleton-card {
      background: var(--bg); border: 1.5px solid var(--border-lt);
      border-radius: 16px; padding: 22px 22px 18px;
      animation: shimmer 1.4s infinite;
    }
    .sk-line { background: var(--bg3); border-radius: 4px; margin-bottom: 10px; }
    @keyframes shimmer {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }

    /* FIX #1: Modal detail barang */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(10,10,10,0.5); backdrop-filter: blur(4px);
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--bg); border-radius: 20px;
      border: 1.5px solid var(--border-lt);
      padding: 36px; min-width: 320px; max-width: 460px; width: 90%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.18);
      animation: fadeUp 0.25s ease;
    }
    .modal-label {
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink4); margin-bottom: 6px;
    }
    .modal-name {
      font-family: 'Bebas Neue', sans-serif; font-size: 38px;
      letter-spacing: 1px; line-height: 1.1; margin-bottom: 24px; word-break: break-word;
    }
    .modal-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 0; border-bottom: 1px solid var(--border-lt);
    }
    .modal-row:last-of-type { border-bottom: none; }
    .modal-row-key { font-size: 12px; color: var(--ink3); }
    .modal-row-val { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; }
    .modal-close {
      margin-top: 24px; width: 100%;
      padding: 12px; background: var(--ink); color: var(--bg);
      border: none; border-radius: 99px; font-size: 13px; font-weight: 600;
      font-family: 'DM Sans', sans-serif; cursor: pointer;
      letter-spacing: 0.5px; text-transform: uppercase; transition: opacity 0.15s;
    }
    .modal-close:hover { opacity: 0.8; }

    /* ── RESPONSIVE ── */
    @media (max-width: 960px) {
      .card-grid { grid-template-columns: repeat(2, 1fr); }
      .topnav, .hero, .toolbar, .grid-section { padding-left: 24px; padding-right: 24px; }
      .stat-block { padding: 18px 24px; }
    }
    @media (max-width: 600px) {
      .card-grid { grid-template-columns: 1fr 1fr; }
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .hero-title { font-size: 52px; }
      .stats-strip { grid-template-columns: 1fr 1fr; }
      .stat-block:nth-child(2) { border-right: none; }
      .stat-block:nth-child(3) { grid-column: 1 / -1; border-top: 1.5px solid var(--border-lt); }
      .toolbar { gap: 8px; }
      .toolbar-right { margin-left: 0; width: 100%; }
      .search-wrap { flex: 1; }
      .search-wrap input { width: 100%; }
    }
    @media (max-width: 400px) {
      .card-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- TOPNAV -->
  <nav class="topnav">
    <a class="brand" href="index.html">
      <div class="brand-mark">
        <svg viewBox="0 0 20 20" fill="white"><path d="M2 4a2 2 0 012-2h12a2 2 0 012 2v1H2V4zm0 3h16v9a2 2 0 01-2 2H4a2 2 0 01-2-2V7zm5 3a1 1 0 000 2h6a1 1 0 000-2H7z"/></svg>
      </div>
      <span class="brand-name">TokoKu Komputer</span>
    </a>
    <div class="nav-links">
      <a class="btn-cta" href="tambah_barang.html">
        <svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 1v12M1 7h12"/></svg>
        Kelola Barang
      </a>
      <div class="user-badge" id="userBadge">
        <div class="user-badge-icon">
          <svg viewBox="0 0 20 20" fill="white"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg>
        </div>
        <span id="userBadgeName">admin</span>
      </div>
      <button class="btn-cta" onclick="logout()" style="background:transparent;color:var(--ink);margin-left:4px;">
        <svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 1H2a1 1 0 00-1 1v10a1 1 0 001 1h3M9 10l3-3-3-3M12 7H4"/></svg>
        Logout
      </button>
    </div>
    <!-- FIX #2: Hamburger fungsional -->
    <button class="hamburger" aria-label="Menu" onclick="toggleMobileMenu()">
      <svg width="16" height="16" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 4h14M2 9h14M2 14h14"/></svg>
    </button>
  </nav>

  <!-- FIX #2: Mobile dropdown menu -->
  <div class="mobile-menu" id="mobileMenu">
    <a class="btn-cta" href="tambah_barang.html">
      <svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 1v12M1 7h12"/></svg>
      Kelola Barang
    </a>
    <div class="user-badge" style="justify-content:center;">
      <div class="user-badge-icon">
        <svg viewBox="0 0 20 20" fill="white"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg>
      </div>
      <span id="userBadgeNameMobile">admin</span>
    </div>
    <button class="btn-cta" onclick="logout()" style="background:transparent;color:var(--ink);">
      <svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 1H2a1 1 0 00-1 1v10a1 1 0 001 1h3M9 10l3-3-3-3M12 7H4"/></svg>
      Logout
    </button>
  </div>

  <!-- HERO -->
  <section class="hero">
    <div>
      <div class="hero-eyebrow">Toko Komputer Terlengkap</div>
      <div class="hero-title">
        <div id="tw-line1" style="height:0.88em; line-height:0.88"></div>
        <div id="tw-line2" style="height:0.88em; line-height:0.88"></div>
      </div>
      <div class="hero-sub">Belanja kebutuhan komputer Anda hanya di TokoKu</div>
    </div>
  </section>

  <!-- STATS -->
  <div class="stats-strip">
    <div class="stat-block">
      <div class="stat-label">Total Barang</div>
      <div class="stat-value" id="statTotal">—</div>
    </div>
    <div class="stat-block">
      <div class="stat-label">Harga Tertinggi</div>
      <div class="stat-value sm" id="statMax">—</div>
    </div>
    <div class="stat-block">
      <div class="stat-label">Rata-rata Harga</div>
      <div class="stat-value sm" id="statAvg">—</div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="toolbar-right">
      <span class="count-txt" id="countBadge">0 item</span>
      <div class="search-wrap">
        <svg width="13" height="13" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="6.5" cy="6.5" r="5"/><path d="M10.5 10.5l3 3"/></svg>
        <input type="text" id="searchInput" placeholder="Cari barang...">
        <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
      </div>
    </div>
  </div>

  <!-- CARD GRID -->
  <section class="grid-section">
    <div class="card-grid" id="cardGrid">
      <!-- FIX #3: Skeleton loading menggantikan "Memuat data..." -->
      <div class="skeleton-card">
        <div class="sk-line" style="height:10px;width:35%;margin-bottom:18px;"></div>
        <div class="sk-line" style="height:16px;width:75%;"></div>
        <div class="sk-line" style="height:16px;width:55%;margin-bottom:18px;"></div>
        <div class="sk-line" style="height:1px;width:100%;margin-bottom:14px;"></div>
        <div class="sk-line" style="height:26px;width:50%;"></div>
      </div>
      <div class="skeleton-card">
        <div class="sk-line" style="height:10px;width:35%;margin-bottom:18px;"></div>
        <div class="sk-line" style="height:16px;width:80%;"></div>
        <div class="sk-line" style="height:16px;width:60%;margin-bottom:18px;"></div>
        <div class="sk-line" style="height:1px;width:100%;margin-bottom:14px;"></div>
        <div class="sk-line" style="height:26px;width:45%;"></div>
      </div>
      <div class="skeleton-card">
        <div class="sk-line" style="height:10px;width:35%;margin-bottom:18px;"></div>
        <div class="sk-line" style="height:16px;width:70%;"></div>
        <div class="sk-line" style="height:16px;width:50%;margin-bottom:18px;"></div>
        <div class="sk-line" style="height:1px;width:100%;margin-bottom:14px;"></div>
        <div class="sk-line" style="height:26px;width:55%;"></div>
      </div>
    </div>
  </section>

  <!-- FIX #1: Modal detail barang -->
  <div class="modal-overlay" id="modalOverlay" onclick="handleModalClick(event)">
    <div class="modal-box">
      <div class="modal-label">Detail Barang</div>
      <div class="modal-name" id="modalName">—</div>
      <div class="modal-row">
        <span class="modal-row-key">Harga</span>
        <span class="modal-row-val" id="modalHarga">—</span>
      </div>
      <div class="modal-row">
        <span class="modal-row-key">Nomor Urut</span>
        <span class="modal-row-val" id="modalNo">—</span>
      </div>
      <button class="modal-close" onclick="closeModal()">Tutup</button>
    </div>
  </div>

  <!-- FIX #4: Toast notifikasi error/sukses -->
  <div class="toast" id="toast">
    <span id="toastIcon">⚠️</span>
    <span id="toastMsg">Pesan</span>
  </div>

  <script src="app.js"></script>
  <script>
    // ── AUTH GUARD & USER BADGE ──
    const _authToken = localStorage.getItem('token_toko');
    if (!_authToken) window.location.href = 'login.html';

    // Tampilkan username di badge
    const savedUser = localStorage.getItem('username_toko');
    if (savedUser) {
      document.querySelectorAll('#userBadgeName, #userBadgeNameMobile')
        .forEach(el => el.textContent = savedUser);
    }

    function logout() {
      localStorage.removeItem('token_toko');
      localStorage.removeItem('username_toko');
      window.location.href = 'login.html';
    }

    function toggleMobileMenu() {
      document.getElementById('mobileMenu').classList.toggle('open');
    }
    document.addEventListener('click', function(e) {
      const menu = document.getElementById('mobileMenu');
      const hamburger = document.querySelector('.hamburger');
      if (menu.classList.contains('open') && !menu.contains(e.target) && !hamburger.contains(e.target)) {
        menu.classList.remove('open');
      }
    });

    // ── FIX #4: Toast notifikasi ──
    let _toastTimer = null;
    function showToast(msg, type) {
      const toast = document.getElementById('toast');
      document.getElementById('toastMsg').textContent = msg;
      document.getElementById('toastIcon').textContent = type === 'success' ? '✓' : '⚠️';
      toast.className = 'toast ' + (type || 'error');
      toast.classList.add('show');
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(function() { toast.classList.remove('show'); }, 3500);
    }

    // ── FIX #1: Modal detail barang ──
    function openModal(barang, no) {
      document.getElementById('modalName').textContent = barang.nama_barang;
      document.getElementById('modalHarga').textContent = 'Rp ' + Number(barang.harga).toLocaleString('id-ID');
      document.getElementById('modalNo').textContent = '#' + String(no).padStart(3, '0');
      document.getElementById('modalOverlay').classList.add('open');
    }
    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
    }
    function handleModalClick(e) {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    }
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });

    // ── DATA ──
    const API = 'http://localhost:8080/platform/api-toko';
    let allBarang = [];

    function updateStats() {
      const prices = allBarang.map(r => Number(r.harga) || 0);
      const total  = allBarang.length;
      const max    = total ? Math.max(...prices) : 0;
      const avg    = total ? Math.round(prices.reduce((a,b) => a+b, 0) / total) : 0;
      document.getElementById('statTotal').textContent = total || '0';
      document.getElementById('statMax').textContent   = total ? 'Rp ' + max.toLocaleString('id-ID') : '—';
      document.getElementById('statAvg').textContent   = total ? 'Rp ' + avg.toLocaleString('id-ID') : '—';
    }

    // ── FIX #5: Escape HTML untuk cegah XSS ──
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderCards(keyword) {
      const q = (keyword || '').trim().toLowerCase();
      document.getElementById('searchClear').className = q ? 'search-clear show' : 'search-clear';

      let list = allBarang;
      if (q) list = list.filter(b => b.nama_barang.toLowerCase().includes(q));

      document.getElementById('countBadge').textContent = list.length + ' item';
      const grid = document.getElementById('cardGrid');

      if (!list.length) {
        // FIX #5: keyword di-escape sebelum dirender
        const safeKw = escapeHtml(keyword);
        grid.innerHTML = '<div class="empty-state"><div class="empty-num">' + (q ? '?' : '0') + '</div><div class="empty-text">' + (q ? '"' + safeKw + '" tidak ditemukan.' : 'Belum ada barang.') + '</div></div>';
        return;
      }

      // FIX #5: hl() pakai teks yang sudah di-escape dulu, baru replace highlight
      function hl(text) {
        const safe = escapeHtml(text);
        if (!q) return safe;
        const safeQ = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        return safe.replace(new RegExp('(' + safeQ + ')', 'gi'), '<span class="highlight">$1</span>');
      }

      grid.innerHTML = list.map(function(b, i) {
        const delay = Math.min(i * 40, 400);
        return '<div class="item-card" style="animation-delay:' + delay + 'ms">' +
          '<div class="ic-header"><span class="ic-num">#' + String(i+1).padStart(3,'0') + '</span></div>' +
          '<div class="ic-name">' + hl(b.nama_barang) + '</div>' +
          '<hr class="ic-divider">' +
          '<div class="ic-price-block">' +
            '<div>' +
              '<div class="ic-price-label">Harga</div>' +
              '<div class="ic-price">Rp ' + Number(b.harga).toLocaleString('id-ID') + '</div>' +
            '</div>' +
            // FIX #1: tombol panah sekarang membuka modal detail
            '<button class="ic-arrow" onclick="openModal(allBarang[' + i + '],' + (i+1) + ')" title="Lihat detail">→</button>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    function renderTable(data) {
      allBarang = data || [];
      updateStats();
      renderCards(document.getElementById('searchInput').value || '');
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      renderCards('');
    }
    document.getElementById('searchInput').addEventListener('input', function() {
      renderCards(this.value);
    });

    // FIX #3 & #4: Tangani jika app.js gagal load atau ambilDataBarang tidak ada
    if (typeof ambilDataBarang !== 'undefined') {
      try {
        ambilDataBarang();
      } catch (err) {
        console.error('ambilDataBarang error:', err);
        showToast('Gagal memuat data. Coba refresh halaman.', 'error');
        document.getElementById('cardGrid').innerHTML = '<div class="empty-state"><div class="empty-num">!</div><div class="empty-text">Gagal memuat data. Periksa koneksi server.</div></div>';
      }
    } else {
      showToast('app.js tidak dapat dimuat. Periksa konfigurasi server.', 'error');
      document.getElementById('cardGrid').innerHTML = '<div class="empty-state"><div class="empty-num">!</div><div class="empty-text">File app.js tidak ditemukan atau gagal dimuat.</div></div>';
    }
  </script>

  <script>
  (function() {
    const line1El = document.getElementById('tw-line1');
    const line2El = document.getElementById('tw-line2');
    const word1 = 'TOKO';
    const word2 = 'KOMPUTER';

    function typeText(el, text, delay, isOutline, onDone) {
      let i = 0;
      const cursor = document.createElement('span');
      cursor.className = 'cursor-blink';
      el.appendChild(cursor);

      setTimeout(function tick() {
        if (i < text.length) {
          const c = document.createElement('span');
          c.textContent = text[i];
          if (isOutline) {
            c.style.webkitTextStroke = '2px var(--ink)';
            c.style.color = 'transparent';
          }
          el.insertBefore(c, cursor);
          i++;
          setTimeout(tick, 90 + Math.random() * 50);
        } else {
          cursor.remove();
          if (onDone) onDone();
        }
      }, delay);
    }

    function eraseText(el, onDone) {
      const chars = el.querySelectorAll('span:not(.cursor-blink)');
      let i = chars.length - 1;
      function erase() {
        if (i >= 0) {
          chars[i].remove();
          i--;
          setTimeout(erase, 50);
        } else {
          if (onDone) onDone();
        }
      }
      erase();
    }

    function runLoop() {
      typeText(line1El, word1, 300, false, function() {
        typeText(line2El, word2, 150, true, function() {
          setTimeout(function() {
            eraseText(line2El, function() {
              eraseText(line1El, function() {
                setTimeout(runLoop, 400);
              });
            });
          }, 1500);
        });
      });
    }

    runLoop();
  })();
  </script>
</body>
