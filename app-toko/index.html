<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Aplikasi Toko</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #1a1207 0%, #2d2010 40%, #1a1207 100%);
            min-height: 100vh;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif !important;
            font-weight: 300 !important;
            letter-spacing: 0.18em !important;
            text-transform: uppercase !important;
            color: #D4A843 !important;
            font-size: 2rem !important;
            margin-bottom: 0.25rem !important;
        }

        h1::after {
            content: '';
            display: block;
            width: 60px;
            height: 1px;
            background: #B8972A;
            margin-top: 10px;
        }

        .p-8 {
            background: transparent !important;
        }

        /* Table wrapper */
        .w-full.bg-white.shadow-md.rounded {
            background: rgba(255,255,255,0.04) !important;
            border: 0.5px solid rgba(255, 0, 0, 0.3) !important;
            border-radius: 12px !important;
            overflow: hidden !important;
            box-shadow: 0 8px 48px rgba(0,0,0,0.4) !important;
            backdrop-filter: blur(10px);
        }

        /* Thead */
        thead.bg-green-500 {
            background: linear-gradient(135deg, #0d0a04 0%, #2d2010 50%, #0d0a04 100%) !important;
        }

        thead th {
            font-family: 'Montserrat', sans-serif !important;
            font-size: 9px !important;
            letter-spacing: 0.3em !important;
            text-transform: uppercase !important;
            font-weight: 400 !important;
            color: #D4A843 !important;
            padding: 1.1rem 1.5rem !important;
            border-bottom: 1px solid rgba(184,151,42,0.4) !important;
        }

        /* Tbody rows */
        #tabel-barang tr {
            border-bottom: 0.5px solid rgba(184,151,42,0.1) !important;
            transition: background 0.25s, transform 0.15s;
        }

        #tabel-barang tr:hover {
            background: rgba(184,151,42,0.08) !important;
            transform: translateX(2px);
        }

        #tabel-barang tr:last-child {
            border-bottom: none !important;
        }

        /* ID column */
        #tabel-barang td:nth-child(1) {
            font-size: 10px;
            letter-spacing: 0.15em;
            color: rgba(0, 0, 0, 0.7);
            font-variant-numeric: tabular-nums;
            padding: 1rem 1.5rem !important;
        }

        /* Nama Barang column */
        #tabel-barang td:nth-child(2) {
            font-family: 'Cormorant Garamond', serif;
            font-size: 17px;
            font-weight: 400;
            letter-spacing: 0.05em;
            color: #c18e18;
            padding: 1rem 1.5rem !important;
        }

        /* Harga column */
        #tabel-barang td:nth-child(3) {
            font-family: 'Cormorant Garamond', serif;
            font-size: 17px;
            font-weight: 600;
            color: #D4A843;
            letter-spacing: 0.05em;
            padding: 1rem 1.5rem !important;
        }
    </style>
</head>
<body class="p-8 bg-gray-100">

    <h1 class="text-2xl font-bold mb-4">Daftar Barang</h1>

    <table class="w-full bg-white shadow-md rounded">
        <thead class="bg-green-500 text-white">
            <tr>
                <th class="p-2">ID</th>
                <th class="p-2">Nama Barang</th>
                <th class="p-2">Harga</th>
            </tr>
        </thead>
        <tbody id="tabel-barang">
        </tbody>
    </table>

    <script src="app.js"></script>
</body>
</html>
